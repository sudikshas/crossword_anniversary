    <!-- `viewport-fit=cover` lets content extend into the safe areas on
         notched/Dynamic-Island iPhones, which is what makes the
         `env(safe-area-inset-bottom)` used by the clue card actually
         return a real value instead of always falling back to 0. -->

      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

      rel="stylesheet"
    />
